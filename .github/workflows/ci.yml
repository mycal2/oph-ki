name: CI

on:
  pull_request:
    branches: [main, develop, staging]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same PR/branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # NOTE: `npm run lint` (next lint) is broken since the Next 16 + ESLint 9
      # upgrade — the legacy .eslintrc.json is incompatible with flat config.
      # Tracked separately; not blocking CI. `next build` below still performs
      # the TypeScript typecheck which catches the vast majority of bugs.

      - name: Build
        run: npm run build
        env:
          # Build-time public env vars. Real values aren't needed for the
          # build itself — Supabase clients use the non-null assertion and
          # only fail at runtime. Placeholders keep the build self-contained
          # without exposing real credentials.
          NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-placeholder"
